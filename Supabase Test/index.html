<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account One — Portal Interno</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #1a2332;
  --navy-mid: #2a3a4e;
  --blue: #4361ee;
  --blue-light: #eef2ff;
  --green: #10b981;
  --green-light: #ecfdf5;
  --red: #ef4444;
  --amber: #f59e0b;
  --amber-light: #fffbeb;
  --purple: #8b5cf6;
  --purple-light: #f5f3ff;
  --orange-light: #fff7ed;
  --bg: #f4f6f9;
  --card: #ffffff;
  --border: #e8ecf1;
  --text: #1a2332;
  --muted: #7c8495;
  --light: #a3aab8;
  --sidebar-w: 240px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

/* ==================== LOGIN ==================== */
.login-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: var(--bg);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.login-box {
  background: white;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 4px 24px rgba(0,0,0,0.08);
  border: 1px solid var(--border);
}
.login-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 28px;
}
.login-logo-icon {
  width: 36px; height: 36px;
  background: var(--navy);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
}
.login-logo-icon svg { width: 18px; height: 18px; }
.login-logo h2 { font-size: 1.15rem; font-weight: 700; color: var(--text); }
.login-logo p { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
.login-box .field { margin-bottom: 16px; }
.login-box .field label { display: block; font-size: 0.78rem; font-weight: 600; color: var(--muted); margin-bottom: 6px; }
.login-box .field input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 10px; font-size: 0.9rem; font-family: inherit;
  background: #fafbfc;
}
.login-box .field input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(67,97,238,0.1); background: white; }
.login-btn {
  width: 100%; padding: 11px; background: var(--navy); color: white; border: none;
  border-radius: 10px; font-size: 0.9rem; font-weight: 600; cursor: pointer; margin-top: 8px;
  transition: background 0.15s;
}
.login-btn:hover { background: var(--navy-mid); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error { color: var(--red); font-size: 0.8rem; margin-top: 12px; display: none; }

/* ==================== APP LAYOUT ==================== */
.app-layout { display: flex; min-height: 100vh; }

/* ==================== SIDEBAR ==================== */
.sidebar {
  width: var(--sidebar-w);
  background: white;
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0; bottom: 0;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 20px 18px 16px;
  display: flex;
  align-items: center;
  gap: 10px;
  cursor: pointer;
}
.brand-icon {
  width: 34px; height: 34px;
  background: var(--navy);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.brand-icon svg { width: 16px; height: 16px; }
.brand-text h1 { font-size: 1rem; font-weight: 700; color: var(--text); line-height: 1.2; }
.brand-text p { font-size: 0.6rem; color: var(--light); text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }

.sidebar-divider { height: 1px; background: var(--border); margin: 0 16px; }

.sidebar-nav { flex: 1; padding: 12px 10px; }

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 10px;
  color: var(--muted);
  text-decoration: none;
  font-size: 0.85rem;
  font-weight: 500;
  transition: all 0.12s;
  margin-bottom: 2px;
  cursor: pointer;
  border: none;
  background: none;
  width: 100%;
  text-align: left;
  font-family: inherit;
}
.nav-item:hover {
  background: #f5f7fa;
  color: var(--text);
}
.nav-item.active {
  background: var(--navy);
  color: white;
}
.nav-item.disabled {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}
.nav-icon {
  width: 28px; height: 28px;
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.95rem;
  flex-shrink: 0;
  transition: background 0.12s;
}
.nav-item.active .nav-icon { background: rgba(255,255,255,0.15); }
.nav-label { flex: 1; }
.nav-badge {
  font-size: 0.58rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 6px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.nav-badge-active { background: rgba(16,185,129,0.12); color: #059669; }
.nav-item.active .nav-badge-active { background: rgba(16,185,129,0.25); color: #6ee7b7; }
.nav-badge-pending { background: rgba(245,158,11,0.1); color: #d97706; }
.nav-item.active .nav-badge-pending { background: rgba(245,158,11,0.2); color: #fcd34d; }

/* ─── User section ─── */
.sidebar-user {
  padding: 14px 14px 16px;
  border-top: 1px solid var(--border);
}
.sidebar-user-info {
  display: flex;
  align-items: center;
  gap: 10px;
}
.user-avatar {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: var(--blue);
  color: white;
  display: flex; align-items: center; justify-content: center;
  font-size: 0.78rem;
  font-weight: 700;
  flex-shrink: 0;
}
.user-meta { flex: 1; min-width: 0; }
.user-meta-name {
  font-size: 0.82rem;
  font-weight: 600;
  color: var(--text);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-meta-role {
  font-size: 0.68rem;
  color: var(--light);
  text-transform: capitalize;
}
.btn-logout-small {
  background: none; border: none; cursor: pointer;
  color: var(--light); font-size: 0.72rem; font-weight: 500;
  padding: 4px 0; font-family: inherit;
  transition: color 0.15s;
}
.btn-logout-small:hover { color: var(--red); }

/* ==================== MAIN CONTENT ==================== */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
}

/* ─── Welcome / Home view ─── */
.home-view { padding: 32px; flex: 1; }

.welcome-banner {
  background: var(--navy);
  border-radius: 14px;
  padding: 28px 32px;
  color: white;
  margin-bottom: 28px;
}
.welcome-banner h2 {
  font-size: 1.25rem;
  font-weight: 700;
  margin-bottom: 4px;
}
.welcome-banner p {
  font-size: 0.88rem;
  opacity: 0.6;
}
.welcome-date {
  font-size: 0.75rem;
  opacity: 0.35;
  margin-top: 10px;
}

.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 16px;
}
.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 20px;
  text-decoration: none;
  color: inherit;
  display: flex;
  gap: 14px;
  align-items: flex-start;
  transition: all 0.15s;
  cursor: pointer;
}
.module-card:hover {
  border-color: var(--blue);
  box-shadow: 0 2px 12px rgba(67,97,238,0.08);
}
.module-card.disabled { opacity: 0.4; cursor: default; pointer-events: none; }
.module-card-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.module-card-body h3 { font-size: 0.9rem; font-weight: 600; color: var(--text); margin-bottom: 3px; }
.module-card-body p { font-size: 0.78rem; color: var(--muted); line-height: 1.5; }
.module-card-badge {
  margin-left: auto;
  font-size: 0.6rem; font-weight: 700; padding: 2px 8px;
  border-radius: 6px; text-transform: uppercase; letter-spacing: 0.3px;
  white-space: nowrap; flex-shrink: 0; align-self: center;
}
.badge-active { background: #ecfdf5; color: #059669; }
.badge-pending { background: #fef3c7; color: #d97706; }

/* ─── Module iframe view ─── */
.module-view {
  flex: 1;
  display: none;
}
.module-view.active { display: flex; flex-direction: column; }
.module-iframe {
  flex: 1;
  width: 100%;
  border: none;
  min-height: 100vh;
}

.hidden { display: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-screen">
  <div class="login-box">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div>
        <h2>Account One</h2>
        <p>Portal Interno</p>
      </div>
    </div>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@accountone.do">
    </div>
    <div class="field">
      <label>Contrasena</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="btn-login" onclick="handleLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-wrapper" class="hidden">
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand" onclick="goHome()">
      <div class="brand-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
      </div>
      <div class="brand-text">
        <h1>Account One</h1>
        <p>Portal Interno</p>
      </div>
    </div>

    <div class="sidebar-divider"></div>

    <nav class="sidebar-nav" id="sidebar-nav"></nav>

    <div class="sidebar-user">
      <div class="sidebar-user-info">
        <div class="user-avatar" id="user-avatar"></div>
        <div class="user-meta">
          <div class="user-meta-name" id="user-display-name"></div>
          <div class="user-meta-role" id="user-display-role"></div>
        </div>
        <button class="btn-logout-small" onclick="handleLogout()">Salir</button>
      </div>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <!-- Home / Welcome -->
    <div class="home-view" id="home-view">
      <div class="welcome-banner" id="welcome-banner"></div>
      <div class="modules-grid" id="modules-grid"></div>
    </div>

    <!-- Module iframe -->
    <div class="module-view" id="module-view">
      <iframe class="module-iframe" id="module-iframe"></iframe>
    </div>
  </div>

</div>
</div>

<script>
const SUPABASE_URL = 'https://ouetusstqvpyjeycfdio.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZXR1c3N0cXZweWpleWNmZGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDcwNzksImV4cCI6MjA5MjIyMzA3OX0.Bsys947JLGEuf3zdBF2GPFdbJVJtaZdC4YEmyBU5Bow';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userRole = null;
let userName = '';
let activeModule = null;

const ROLE_LABELS = {
  admin: 'Administrador',
  ventas: 'Ventas',
  contadora: 'Contadora',
  implementadora: 'Implementadora',
  analista: 'Analista'
};

const ALL_MODULES = [
  {
    id: 'ventas',
    title: 'Equipo Comercial',
    desc: 'Leads, funnel de ventas, ROAS y seguimiento del pipeline comercial.',
    icon: '\ud83d\udcc8',
    iconBg: '#eef2ff',
    href: 'ventas.html',
    roles: ['admin', 'ventas'],
    active: true
  },
  {
    id: 'contadores',
    title: 'Control de Clientes',
    desc: 'Clientes por contadora, carga de trabajo, implementaciones y software.',
    icon: '\ud83d\udc65',
    iconBg: '#ecfdf5',
    href: 'contadores.html',
    roles: ['admin', 'contadora', 'implementadora', 'analista'],
    active: true
  },
  {
    id: 'kpi',
    title: 'KPI Scorecard',
    desc: 'Evaluacion trimestral: digitacion, resumenes y reuniones.',
    icon: '\ud83c\udfaf',
    iconBg: '#f5f3ff',
    href: 'kpi.html',
    roles: ['admin', 'contadora'],
    active: false
  },
  {
    id: 'implementaciones',
    title: 'Implementaciones',
    desc: 'Onboarding, fechas y estado de cada implementacion.',
    icon: '\ud83d\ude80',
    iconBg: '#fff7ed',
    href: 'implementaciones.html',
    roles: ['admin', 'implementadora'],
    active: false
  }
];

function getInitials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Buenos dias';
  if (h < 18) return 'Buenas tardes';
  return 'Buenas noches';
}

function formatToday() {
  const d = new Date();
  const dias = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return dias[d.getDay()] + ' ' + d.getDate() + ' de ' + meses[d.getMonth()] + ', ' + d.getFullYear();
}

function goHome() {
  activeModule = null;
  document.getElementById('home-view').style.display = '';
  document.getElementById('module-view').classList.remove('active');
  document.getElementById('module-iframe').src = '';
  renderSidebar();
}

function openModule(moduleId) {
  const m = ALL_MODULES.find(mod => mod.id === moduleId);
  if (!m || !m.active) return;

  activeModule = moduleId;
  document.getElementById('home-view').style.display = 'none';
  document.getElementById('module-view').classList.add('active');
  document.getElementById('module-iframe').src = m.href + '?embed=1';
  renderSidebar();
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const visible = ALL_MODULES.filter(m => m.roles.includes(userRole));

  let html = '';

  // Home item
  html += '<button class="nav-item' + (activeModule === null ? ' active' : '') + '" onclick="goHome()">';
  html += '<div class="nav-icon" style="background:' + (activeModule === null ? 'rgba(255,255,255,0.15)' : '#f5f7fa') + '">';
  html += '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="' + (activeModule === null ? 'white' : '#7c8495') + '" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>';
  html += '</div>';
  html += '<span class="nav-label">Inicio</span>';
  html += '</button>';

  html += '<div style="height:6px"></div>';

  visible.forEach(m => {
    const isActive = activeModule === m.id;
    const badgeClass = m.active ? 'nav-badge-active' : 'nav-badge-pending';
    const badgeText = m.active ? 'Activo' : 'Pendiente';
    const disabledClass = m.active ? '' : ' disabled';
    const activeClass = isActive ? ' active' : '';

    html += '<button class="nav-item' + activeClass + disabledClass + '" onclick="openModule(\'' + m.id + '\')">';
    html += '<div class="nav-icon" style="background:' + (isActive ? 'rgba(255,255,255,0.15)' : m.iconBg) + '">' + m.icon + '</div>';
    html += '<span class="nav-label">' + m.title + '</span>';
    html += '</button>';
  });

  nav.innerHTML = html;
}

function renderModules() {
  const grid = document.getElementById('modules-grid');
  const visible = ALL_MODULES.filter(m => m.roles.includes(userRole));

  grid.innerHTML = visible.map(m => {
    const badgeClass = m.active ? 'badge-active' : 'badge-pending';
    const badgeText = m.active ? 'Activo' : 'Pendiente';
    const disabledClass = m.active ? '' : ' disabled';
    const onclick = m.active ? ' onclick="openModule(\'' + m.id + '\')"' : '';

    return '<div class="module-card' + disabledClass + '"' + onclick + '>' +
      '<div class="module-card-icon" style="background:' + m.iconBg + '">' + m.icon + '</div>' +
      '<div class="module-card-body">' +
        '<h3>' + m.title + '</h3>' +
        '<p>' + m.desc + '</p>' +
      '</div>' +
      '<span class="module-card-badge ' + badgeClass + '">' + badgeText + '</span>' +
    '</div>';
  }).join('');
}

function renderWelcome() {
  const el = document.getElementById('welcome-banner');
  const firstName = userName.split(' ')[0];

  el.innerHTML =
    '<h2>' + getGreeting() + ', ' + firstName + '</h2>' +
    '<p>Selecciona un modulo para comenzar.</p>' +
    '<div class="welcome-date">' + formatToday() + '</div>';
}

function renderUserInfo() {
  document.getElementById('user-avatar').textContent = getInitials(userName);
  document.getElementById('user-display-name').textContent = userName;
  document.getElementById('user-display-role').textContent = ROLE_LABELS[userRole] || userRole;
}

// ==================== AUTH ====================

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  if (!email || !password) {
    errorEl.textContent = 'Ingresa email y contrasena.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errorEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = 'Email o contrasena incorrectos.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  await loadUserProfile();
  showApp();
}

async function handleLogout() {
  await sb.auth.signOut();
  userRole = null;
  userName = '';
  activeModule = null;
  document.getElementById('app-wrapper').classList.add('hidden');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
  document.getElementById('module-iframe').src = '';
}

async function loadUserProfile() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  const { data: profile } = await sb.from('profiles')
    .select('nombre, rol')
    .eq('id', user.id)
    .single();

  if (profile) {
    userRole = profile.rol;
    userName = profile.nombre || user.email;
  } else {
    userRole = 'contadora';
    userName = user.email;
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrapper').classList.remove('hidden');

  renderUserInfo();
  renderSidebar();
  renderWelcome();
  renderModules();
}

document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadUserProfile();
    showApp();
  }
}

init();
</script>
</body>
</html>
