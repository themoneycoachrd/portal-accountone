<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Account One — Portal Interno</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root {
  --navy: #1e3a5f;
  --navy-light: #2d4a7a;
  --blue: #3b82f6;
  --green: #10b981;
  --red: #ef4444;
  --amber: #f59e0b;
  --purple: #8b5cf6;
  --bg: #f8fafc;
  --card: #ffffff;
  --border: #e5e7eb;
  --text: #1f2937;
  --muted: #6b7280;
  --light: #9ca3af;
  --sidebar-w: 260px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.5;
}

/* ==================== LOGIN ==================== */
.login-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: linear-gradient(135deg, #1e3a5f 0%, #2d4a7a 50%, #1e3a5f 100%);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 1000;
}
.login-box {
  background: white;
  border-radius: 16px;
  padding: 40px;
  width: 100%;
  max-width: 400px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}
.login-box h2 { font-size: 1.4rem; color: var(--navy); margin-bottom: 4px; }
.login-box .subtitle { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
.login-box .field { margin-bottom: 16px; }
.login-box .field label { display: block; font-size: 0.8rem; font-weight: 600; color: var(--text); margin-bottom: 6px; }
.login-box .field input {
  width: 100%; padding: 10px 14px; border: 1px solid var(--border);
  border-radius: 8px; font-size: 0.95rem; font-family: inherit;
}
.login-box .field input:focus { outline: none; border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
.login-btn {
  width: 100%; padding: 12px; background: var(--navy); color: white; border: none;
  border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer; margin-top: 8px;
}
.login-btn:hover { background: var(--navy-light); }
.login-btn:disabled { opacity: 0.6; cursor: not-allowed; }
.login-error { color: var(--red); font-size: 0.8rem; margin-top: 12px; display: none; }

/* ==================== APP LAYOUT ==================== */
.app-layout {
  display: flex;
  min-height: 100vh;
}

/* ==================== SIDEBAR ==================== */
.sidebar {
  width: var(--sidebar-w);
  background: var(--navy);
  color: white;
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0;
  left: 0;
  bottom: 0;
  z-index: 100;
  overflow-y: auto;
}

.sidebar-brand {
  padding: 24px 20px 20px;
  border-bottom: 1px solid rgba(255,255,255,0.1);
}
.sidebar-brand h1 {
  font-size: 1.2rem;
  font-weight: 800;
  letter-spacing: -0.3px;
}
.sidebar-brand p {
  font-size: 0.75rem;
  opacity: 0.5;
  margin-top: 2px;
  text-transform: uppercase;
  letter-spacing: 1px;
}

.sidebar-nav {
  flex: 1;
  padding: 16px 12px;
}
.sidebar-section-label {
  font-size: 0.65rem;
  text-transform: uppercase;
  letter-spacing: 1px;
  color: rgba(255,255,255,0.35);
  padding: 12px 8px 6px;
  font-weight: 600;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 10px 12px;
  border-radius: 10px;
  color: rgba(255,255,255,0.7);
  text-decoration: none;
  font-size: 0.88rem;
  font-weight: 500;
  transition: all 0.15s;
  margin-bottom: 2px;
  cursor: pointer;
  position: relative;
}
.nav-item:hover {
  background: rgba(255,255,255,0.1);
  color: white;
}
.nav-item.active {
  background: rgba(255,255,255,0.15);
  color: white;
  font-weight: 600;
}
.nav-item.disabled {
  opacity: 0.35;
  cursor: default;
  pointer-events: none;
}
.nav-icon {
  width: 32px;
  height: 32px;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1rem;
  flex-shrink: 0;
}
.nav-label { flex: 1; }
.nav-badge {
  font-size: 0.6rem;
  font-weight: 700;
  padding: 2px 7px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.nav-badge-active {
  background: rgba(16,185,129,0.2);
  color: #6ee7b7;
}
.nav-badge-pending {
  background: rgba(245,158,11,0.2);
  color: #fcd34d;
}

/* ─── Sidebar user ─── */
.sidebar-user {
  padding: 16px;
  border-top: 1px solid rgba(255,255,255,0.1);
}
.sidebar-user-info {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 10px;
}
.user-avatar {
  width: 36px;
  height: 36px;
  border-radius: 10px;
  background: rgba(255,255,255,0.15);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 0.85rem;
  font-weight: 700;
  flex-shrink: 0;
}
.user-meta { flex: 1; min-width: 0; }
.user-meta-name {
  font-size: 0.85rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-meta-role {
  font-size: 0.7rem;
  opacity: 0.5;
  text-transform: capitalize;
}
.btn-logout {
  width: 100%;
  padding: 7px;
  background: rgba(255,255,255,0.08);
  color: rgba(255,255,255,0.6);
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 8px;
  font-size: 0.78rem;
  font-weight: 500;
  cursor: pointer;
  transition: all 0.15s;
  font-family: inherit;
}
.btn-logout:hover {
  background: rgba(255,255,255,0.15);
  color: white;
}

/* ==================== MAIN CONTENT ==================== */
.main-content {
  margin-left: var(--sidebar-w);
  flex: 1;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

.main-header {
  padding: 28px 36px 0;
}
.main-header h2 {
  font-size: 1.4rem;
  font-weight: 700;
  color: var(--text);
}
.main-header p {
  font-size: 0.9rem;
  color: var(--muted);
  margin-top: 4px;
}

.main-body {
  flex: 1;
  padding: 28px 36px;
}

/* ─── Module cards (main area) ─── */
.modules-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
  gap: 20px;
}
.module-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 24px;
  text-decoration: none;
  color: inherit;
  display: flex;
  gap: 16px;
  align-items: flex-start;
  transition: all 0.2s;
  cursor: pointer;
  position: relative;
}
.module-card:hover {
  border-color: var(--blue);
  box-shadow: 0 4px 16px rgba(0,0,0,0.07);
  transform: translateY(-1px);
}
.module-card.disabled {
  opacity: 0.45;
  cursor: default;
}
.module-card.disabled:hover {
  border-color: var(--border);
  box-shadow: none;
  transform: none;
}
.module-card-icon {
  width: 44px;
  height: 44px;
  border-radius: 10px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.2rem;
  flex-shrink: 0;
}
.module-card-body { flex: 1; }
.module-card-body h3 {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 4px;
}
.module-card-body p {
  font-size: 0.8rem;
  color: var(--muted);
  line-height: 1.5;
}
.module-card-badge {
  position: absolute;
  top: 12px;
  right: 14px;
  font-size: 0.65rem;
  font-weight: 600;
  padding: 2px 8px;
  border-radius: 8px;
  text-transform: uppercase;
  letter-spacing: 0.3px;
}
.badge-active { background: #d1fae5; color: #065f46; }
.badge-pending { background: #fef3c7; color: #92400e; }

/* ─── Welcome section ─── */
.welcome-section {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 100%);
  border-radius: 16px;
  padding: 32px;
  color: white;
  margin-bottom: 28px;
}
.welcome-section h2 {
  font-size: 1.3rem;
  font-weight: 700;
  margin-bottom: 6px;
}
.welcome-section p {
  font-size: 0.9rem;
  opacity: 0.75;
}
.welcome-date {
  font-size: 0.8rem;
  opacity: 0.5;
  margin-top: 12px;
}

/* ─── Footer ─── */
.main-footer {
  padding: 20px 36px;
  font-size: 0.75rem;
  color: var(--light);
  text-align: center;
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 768px) {
  :root { --sidebar-w: 220px; }
  .main-body { padding: 20px; }
  .main-header { padding: 20px 20px 0; }
  .modules-grid { grid-template-columns: 1fr; }
}
@media (max-width: 600px) {
  .sidebar { display: none; }
  .main-content { margin-left: 0; }
  .mobile-header {
    display: flex;
    background: var(--navy);
    color: white;
    padding: 16px 20px;
    align-items: center;
    justify-content: space-between;
  }
  .mobile-header h1 { font-size: 1.1rem; font-weight: 700; }
}

.hidden { display: none; }
</style>
</head>
<body>

<!-- LOGIN -->
<div class="login-overlay" id="login-screen">
  <div class="login-box">
    <h2>Account One</h2>
    <p class="subtitle">Inicia sesion para continuar</p>
    <div class="field">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="tu@accountone.do">
    </div>
    <div class="field">
      <label>Contrasena</label>
      <input type="password" id="login-password" placeholder="••••••••">
    </div>
    <button class="login-btn" id="btn-login" onclick="handleLogin()">Entrar</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<!-- APP -->
<div id="app-wrapper" class="hidden">
<div class="app-layout">

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-brand">
      <h1>Account One</h1>
      <p>Portal Interno</p>
    </div>

    <nav class="sidebar-nav" id="sidebar-nav">
      <!-- Rendered by JS -->
    </nav>

    <div class="sidebar-user">
      <div class="sidebar-user-info">
        <div class="user-avatar" id="user-avatar"></div>
        <div class="user-meta">
          <div class="user-meta-name" id="user-display-name"></div>
          <div class="user-meta-role" id="user-display-role"></div>
        </div>
      </div>
      <button class="btn-logout" onclick="handleLogout()">Cerrar sesion</button>
    </div>
  </aside>

  <!-- MAIN -->
  <div class="main-content">
    <div class="main-body">
      <div class="welcome-section" id="welcome-section"></div>
      <div class="modules-grid" id="modules-grid"></div>
    </div>
    <div class="main-footer">Account One — Portal Interno 2026</div>
  </div>

</div>
</div><!-- /app-wrapper -->

<script>
const SUPABASE_URL = 'https://ouetusstqvpyjeycfdio.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im91ZXR1c3N0cXZweWpleWNmZGlvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2NDcwNzksImV4cCI6MjA5MjIyMzA3OX0.Bsys947JLGEuf3zdBF2GPFdbJVJtaZdC4YEmyBU5Bow';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

let userRole = null;
let userName = '';

const ROLE_LABELS = {
  admin: 'Administrador',
  ventas: 'Ventas',
  contadora: 'Contadora',
  implementadora: 'Implementadora',
  analista: 'Analista'
};

const ALL_MODULES = [
  {
    id: 'ventas',
    title: 'Pipeline de Ventas',
    desc: 'Leads, funnel de ventas, ROAS y seguimiento del pipeline comercial.',
    icon: '\ud83d\udcc8',
    iconBg: '#eff6ff',
    href: 'ventas.html',
    roles: ['admin', 'ventas'],
    active: true
  },
  {
    id: 'contadores',
    title: 'Control de Clientes',
    desc: 'Clientes por contadora, carga de trabajo, implementaciones y software.',
    icon: '\ud83d\udc65',
    iconBg: '#f0fdf4',
    href: 'contadores.html',
    roles: ['admin', 'contadora', 'implementadora', 'analista'],
    active: true
  },
  {
    id: 'kpi',
    title: 'KPI Scorecard',
    desc: 'Evaluacion trimestral: digitacion, resumenes y reuniones.',
    icon: '\ud83c\udfaf',
    iconBg: '#faf5ff',
    href: 'kpi.html',
    roles: ['admin', 'contadora'],
    active: false
  },
  {
    id: 'implementaciones',
    title: 'Implementaciones',
    desc: 'Onboarding de clientes, fechas y estado de cada implementacion.',
    icon: '\ud83d\ude80',
    iconBg: '#fff7ed',
    href: 'implementaciones.html',
    roles: ['admin', 'implementadora'],
    active: false
  }
];

function getInitials(name) {
  const parts = name.trim().split(/\s+/);
  if (parts.length >= 2) return (parts[0][0] + parts[1][0]).toUpperCase();
  return name.substring(0, 2).toUpperCase();
}

function getGreeting() {
  const h = new Date().getHours();
  if (h < 12) return 'Buenos dias';
  if (h < 18) return 'Buenas tardes';
  return 'Buenas noches';
}

function formatToday() {
  const d = new Date();
  const dias = ['Domingo','Lunes','Martes','Miercoles','Jueves','Viernes','Sabado'];
  const meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  return dias[d.getDay()] + ' ' + d.getDate() + ' de ' + meses[d.getMonth()] + ', ' + d.getFullYear();
}

function renderSidebar() {
  const nav = document.getElementById('sidebar-nav');
  const visible = ALL_MODULES.filter(m => m.roles.includes(userRole));

  let html = '<div class="sidebar-section-label">Modulos</div>';
  visible.forEach(m => {
    const badgeClass = m.active ? 'nav-badge-active' : 'nav-badge-pending';
    const badgeText = m.active ? 'Activo' : 'Pendiente';
    const disabledClass = m.active ? '' : ' disabled';
    const tag = m.active ? 'a' : 'div';
    const hrefAttr = m.active ? ' href="' + m.href + '"' : '';

    html += '<' + tag + ' class="nav-item' + disabledClass + '"' + hrefAttr + '>';
    html += '<div class="nav-icon" style="background:' + m.iconBg + '">' + m.icon + '</div>';
    html += '<span class="nav-label">' + m.title + '</span>';
    html += '<span class="nav-badge ' + badgeClass + '">' + badgeText + '</span>';
    html += '</' + tag + '>';
  });

  nav.innerHTML = html;
}

function renderModules() {
  const grid = document.getElementById('modules-grid');
  const visible = ALL_MODULES.filter(m => m.roles.includes(userRole));

  grid.innerHTML = visible.map(m => {
    const badgeClass = m.active ? 'badge-active' : 'badge-pending';
    const badgeText = m.active ? 'Activo' : 'Pendiente';
    const tag = m.active ? 'a' : 'div';
    const hrefAttr = m.active ? ' href="' + m.href + '"' : '';
    const disabledClass = m.active ? '' : ' disabled';

    return '<' + tag + ' class="module-card' + disabledClass + '"' + hrefAttr + '>' +
      '<span class="module-card-badge ' + badgeClass + '">' + badgeText + '</span>' +
      '<div class="module-card-icon" style="background:' + m.iconBg + '">' + m.icon + '</div>' +
      '<div class="module-card-body">' +
        '<h3>' + m.title + '</h3>' +
        '<p>' + m.desc + '</p>' +
      '</div>' +
    '</' + tag + '>';
  }).join('');
}

function renderWelcome() {
  const el = document.getElementById('welcome-section');
  const firstName = userName.split(' ')[0];

  el.innerHTML =
    '<h2>' + getGreeting() + ', ' + firstName + '</h2>' +
    '<p>Selecciona un modulo del menu para comenzar.</p>' +
    '<div class="welcome-date">' + formatToday() + '</div>';
}

function renderUserInfo() {
  document.getElementById('user-avatar').textContent = getInitials(userName);
  document.getElementById('user-display-name').textContent = userName;
  document.getElementById('user-display-role').textContent = ROLE_LABELS[userRole] || userRole;
}

// ==================== AUTH ====================

async function handleLogin() {
  const email = document.getElementById('login-email').value.trim();
  const password = document.getElementById('login-password').value;
  const errorEl = document.getElementById('login-error');
  const btn = document.getElementById('btn-login');

  if (!email || !password) {
    errorEl.textContent = 'Ingresa email y contrasena.';
    errorEl.style.display = 'block';
    return;
  }

  btn.disabled = true;
  btn.textContent = 'Entrando...';
  errorEl.style.display = 'none';

  const { data, error } = await sb.auth.signInWithPassword({ email, password });

  if (error) {
    errorEl.textContent = 'Email o contrasena incorrectos.';
    errorEl.style.display = 'block';
    btn.disabled = false;
    btn.textContent = 'Entrar';
    return;
  }

  await loadUserProfile();
  showApp();
}

async function handleLogout() {
  await sb.auth.signOut();
  userRole = null;
  userName = '';
  document.getElementById('app-wrapper').classList.add('hidden');
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('login-password').value = '';
}

async function loadUserProfile() {
  const { data: { user } } = await sb.auth.getUser();
  if (!user) return;

  const { data: profile } = await sb.from('profiles')
    .select('nombre, rol')
    .eq('id', user.id)
    .single();

  if (profile) {
    userRole = profile.rol;
    userName = profile.nombre || user.email;
  } else {
    userRole = 'contadora';
    userName = user.email;
  }
}

function showApp() {
  document.getElementById('login-screen').style.display = 'none';
  document.getElementById('app-wrapper').classList.remove('hidden');

  renderUserInfo();
  renderSidebar();
  renderWelcome();
  renderModules();
}

// Enter key handlers
document.getElementById('login-password').addEventListener('keydown', e => {
  if (e.key === 'Enter') handleLogin();
});
document.getElementById('login-email').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('login-password').focus();
});

// Check existing session
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    await loadUserProfile();
    showApp();
  }
}

init();
</script>
</body>
</html>
