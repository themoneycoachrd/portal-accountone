  .breadcrumb-bar a:hover { color:var(--navy); text-decoration:underline; }
  .breadcrumb-bar .sep { color:var(--light); font-size:11px; }

  .main-tab { padding:12px 24px; cursor:pointer; font-weight:600; font-size:0.95rem; color:var(--muted); border-bottom:3px solid transparent; transition:all 0.2s; background:none; border-top:none; border-left:none; border-right:none; }
  .main-tab:hover { color:var(--text); }
  .main-tab.active { color:var(--navy); border-bottom-color:var(--navy); }
  .sub-tabs { display:flex; gap:4px; padding:10px 24px; background:#f8fafc; border-bottom:1px solid var(--border); overflow-x:auto; }
  .sub-tab { padding:6px 12px; border-radius:6px; font-size:12px; font-weight:600; cursor:pointer; border:1px solid var(--border); background:white; color:var(--muted); white-space:nowrap; transition:all 0.15s; }
  .sub-tab:hover { background:#e2e8f0; }
  .sub-tab.active { background:var(--navy); color:white; border-color:var(--navy); }

  .content { padding:20px 24px; max-width:1100px; margin:0 auto; }

  .stat-sub { font-size:11px; color:var(--light); margin-top:4px; }
  .stat-green { color:var(--green); }
  .stat-red { color:var(--red); }

  .card { background:var(--card); border-radius:12px; padding:16px; border:1px solid var(--border); margin-bottom:16px; }
  .card h3 { font-size:13px; font-weight:700; color:var(--muted); margin-bottom:12px; }

  .bar-track { flex:1; height:24px; background:#f1f5f9; border-radius:6px; overflow:hidden; position:relative; }

  .bar-fill span { font-size:11px; font-weight:700; color:white; }
  .bar-extra { font-size:11px; color:var(--muted); width:60px; text-align:right; }

  .client-dot { width:10px; height:10px; border-radius:50%; }

  .badge-churn { background:#fef2f2; color:#991b1b; border-color:#fecaca; }

  .perfil-field { background:#f8fafc; border-radius:8px; padding:10px 14px; }

  .perfil-field-value { font-size:14px; font-weight:600; color:var(--text); }

  .perfil-actions { display:flex; gap:8px; margin-top:10px; }

  .perfil-btn-danger { color:var(--red); border-color:#fecaca; }

  .perfil-empty { text-align:center; padding:40px 20px; color:var(--light); }

function getSoftwareStats() {
  const base = SOFTWARE_CLIENTES.filter(c => c.periodo === "2025");

  const mesesActivos = ["enero","febrero","marzo","abril"];
  let acumClientes = base.length;
  let acumMonto = baseMonto;

  const rows = mesesActivos.map(m => {
    const nuevos = SOFTWARE_CLIENTES.filter(c => c.periodo === m);
    const nuevosMonto = nuevos.reduce((s,c) => s + c.monto, 0);
    const prevTotal = acumClientes;
    acumClientes += nuevos.length;
    acumMonto += nuevosMonto;
    const neto = nuevos.length;
    const pct = prevTotal > 0 ? (neto / prevTotal * 100) : 0;
    return { mes: m, total: acumClientes, nuevos: nuevos, churn: [], neto, pct, monto: acumMonto };
  });
  return { base, baseMonto, baseCount: base.length, rows };
}

function contadoraAdm(asig, name) { return (asig[name]||[]).reduce((s,c)=>s+c.a,0); }

function getImplStatus(impl) {
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  if (!impl.implInicio) return { label:"Pendiente", color:"#9ca3af", bg:"#f1f5f9", icon:"⏳", pct:0 };
  const inicio = new Date(impl.implInicio);
  const fin = new Date(impl.implFin);
  if (hoy < inicio) return { label:"Por iniciar", color:"#3b82f6", bg:"#eff6ff", icon:"📅", pct:0 };
  if (hoy > fin) return { label:"Completada", color:"#10b981", bg:"#ecfdf5", icon:"✓", pct:100 };
  const total = fin - inicio;
  const avance = hoy - inicio;
  const pct = total > 0 ? Math.round(avance / total * 100) : 0;
  return { label:"En progreso", color:"#f59e0b", bg:"#fffbeb", icon:"⚡", pct:pct };
}

function formatFecha(dateStr) {
  if (!dateStr) return "—";
  const d = new Date(dateStr);
  const dia = d.getDate();
  const mesLabel = ["ene","feb","mar","abr","may","jun","jul","ago","sep","oct","nov","dic"][d.getMonth()];
  return dia + ' ' + mesLabel + ' ' + d.getFullYear();
}

function diasRestantes(dateStr) {
  if (!dateStr) return null;
  const hoy = new Date();
  hoy.setHours(0,0,0,0);
  const fin = new Date(dateStr);
  const diff = Math.ceil((fin - hoy) / (1000*60*60*24));
  return diff;
}

function getAllMonths(data) { return MESES.filter(m=>data[m]); }

function getPrevMonth(data, mes) {
  const idx = MESES.indexOf(mes);
  if (idx <= 0) return null;
  const prev = MESES[idx-1];
  return data[prev] ? prev : null;
}

function getGrowth(data, mes, d) {
  const prev = getPrevMonth(data, mes);
  if (!prev) {
    const prevTotal = d.total - d.nuevos.length + d.churn.length;
    if (prevTotal === 0) return {neto: d.nuevos.length - d.churn.length, pct: 0, prevTotal: 0};
    const neto = d.nuevos.length - d.churn.length;
    return {neto, pct: (neto/prevTotal*100), prevTotal};
  }
  const prevTotal = data[prev].total;
  const neto = d.nuevos.length - d.churn.length;
  return {neto, pct: prevTotal>0?(neto/prevTotal*100):0, prevTotal};
}

function tieneCapacidad(mes, nombre) {
  return MESES_CON_CAPACIDAD.includes(mes) && CAPACIDAD[nombre] !== undefined;
}
function getCapacidad(nombre) { return CAPACIDAD[nombre] || null; }
function getUtilCapacidad(mes, nombre, admTotal) {
  if (!tieneCapacidad(mes, nombre)) return null;
  const cap = CAPACIDAD[nombre];
  return cap > 0 ? Math.round(admTotal / cap * 100) : 0;
}

function getMonthData(mes) { return DATA[mes]; }

function getLastMonth() {
  const months = getAllMonths(DATA);
  return months[months.length-1];
}

function getDashboardStats() {
  const months = getAllMonths(DATA);
  const last = DATA[months[months.length-1]];
  const first = DATA[months[0]];
  const totalNuevos = months.reduce((s,m)=>s+DATA[m].nuevos.length,0);
  const totalChurn = months.reduce((s,m)=>s+DATA[m].churn.length,0);
  const baseLine = first.total - first.nuevos.length + first.churn.length;
  const ytdGrowth = baseLine > 0 ? ((last.total - baseLine) / baseLine * 100) : 0;
  const ytdNeto = last.total - baseLine;

  const growthData = months.map((m,i)=>{
    if (i===0) { const prev=DATA[m].total-DATA[m].nuevos.length+DATA[m].churn.length; return prev>0?((DATA[m].nuevos.length-DATA[m].churn.length)/prev*100):0; }
    const prev=DATA[months[i-1]].total;
    return prev>0?((DATA[m].nuevos.length-DATA[m].churn.length)/prev*100):0;
  });

  return { months, last, first, totalNuevos, totalChurn, growthData, ytdGrowth, ytdNeto, baseLine };
}

function getMonthViewData(mes) {
  const d = DATA[mes];
  const idx = MESES.indexOf(mes);
  const asig = d.asignaciones;
  const names = Object.keys(asig).sort((a,b)=>{
    if (a==="Sin asignar") return 1;
    if (b==="Sin asignar") return -1;
    return asig[b].length - asig[a].length;
  });
  const maxC = Math.max(...names.map(n=>asig[n].length),1);
  const growth = getGrowth(DATA, mes, d);
  const growthSign = growth.neto >= 0 ? '+' : '';
  const growthColor = growth.neto >= 0 ? 'stat-green' : 'stat-red';
  const pctStr = growth.pct >= 0 ? '+'+growth.pct.toFixed(1)+'%' : growth.pct.toFixed(1)+'%';

  const nuevosHtml = d.nuevos.length > 0
    ? d.nuevos.map(n=>'<span class="badge badge-new" style="margin:1px 2px">'+n+'</span>').join('')
    : '<span style="color:#94a3b8;font-size:13px">Ninguno</span>';
  const churnHtml = d.churn.length > 0
    ? d.churn.map(n=>'<span class="badge badge-churn" style="margin:1px 2px">'+n+'</span>').join('')
    : '<span style="color:#94a3b8;font-size:13px">Ninguno</span>';

  return { d, idx, asig, names, maxC, growth, growthSign, growthColor, pctStr, nuevosHtml, churnHtml };
}

    diasLabel = dias > 0 ? dias + ' d\u00edas restantes' : dias === 0 ? 'Termina hoy' : Math.abs(dias) + ' d\u00edas de atraso';

    const diasInicio = diasRestantes(impl.implInicio);

  const totalChurn = stats.rows.reduce((s,r) => s + r.churn.length, 0);
  const ytdPct = stats.baseCount > 0 ? ((last.total - stats.baseCount) / stats.baseCount * 100) : 0;

  // Group clients by license type
  const groups = {};
  SOFTWARE_CLIENTES.forEach(c => {
    if (!groups[c.licencia]) groups[c.licencia] = [];
    groups[c.licencia].push(c);
  });
  const LICENCIA_ORDER = ['Punto de Venta','Starter','Starter + FE','Basic','Basic + FE','Standard','Standard + FE','Premium + FE','Nomina','Manufactura'];

    const ia = LICENCIA_ORDER.indexOf(a); const ib = LICENCIA_ORDER.indexOf(b);

    'Basic + FE': '#3b82f6', 'Basic': '#60a5fa', 'Starter + FE': '#10b981', 'Starter': '#34d399',

        ${stats.rows.map(r => {

function toggleSwLic(id, headerEl) {
  const detail = document.getElementById(id);

    detail.classList.toggle('open');

  }

          return '';
        }
      }}},
      scales:{x:{beginAtZero:true,ticks:{stepSize:1}}}
    }
  }));

  // Gráfico de transacciones — barra = Serv. Contratado, tooltip muestra ambos
  const servData = names.map(n=>contadoraServ(asig,n));
  const admData = names.map(n=>contadoraAdm(asig,n));

    data:{labels:names, datasets:[

    options:{indexAxis:'y',responsive:true,
      plugins:{legend:{display:false},tooltip:{callbacks:{
        label:function(ctx){
          const i=ctx.dataIndex;

function loadPerfiles() {
  try {
    const raw = localStorage.getItem(PERFIL_STORAGE_KEY);
    if (raw) {
      const stored = JSON.parse(raw);
      if (Array.isArray(stored) && stored.length > 0) return stored;
    }
    // Primera carga o vacío: inyectar datos iniciales
    const init = JSON.parse(JSON.stringify(PERFILES_INICIALES));
    savePerfiles(init);
    return init;
  } catch(e) {
    const init = JSON.parse(JSON.stringify(PERFILES_INICIALES));
    savePerfiles(init);
    return init;
  }
}
function savePerfiles(perfiles) { localStorage.setItem(PERFIL_STORAGE_KEY, JSON.stringify(perfiles)); }

let perfilOpen = {};
let perfilEditing = {};

function togglePerfil(idx) {
  perfilOpen[idx] = !perfilOpen[idx];
  renderPerfiles(document.getElementById('content'));
}

function startEditPerfil(idx) {
  perfilEditing[idx] = true;
  renderPerfiles(document.getElementById('content'));
}

function cancelEditPerfil(idx) {
  delete perfilEditing[idx];
  renderPerfiles(document.getElementById('content'));
}

function savePerfil(idx) {
  const perfiles = loadPerfiles();
  PERFIL_FIELDS.forEach(sec => {
    sec.fields.forEach(f => {
      const input = document.getElementById('pf-'+idx+'-'+f.id);
      if (input) perfiles[idx][f.id] = input.value.trim();
    });
  });
  savePerfiles(perfiles);
  delete perfilEditing[idx];
  renderPerfiles(document.getElementById('content'));
}

function addPerfil() {
  const nombre = prompt('Nombre del cliente:');
  if (!nombre || !nombre.trim()) return;
  const perfiles = loadPerfiles();
  const nuevo = { _nombre: nombre.trim() };
  PERFIL_FIELDS.forEach(sec => sec.fields.forEach(f => { nuevo[f.id] = ''; }));
  perfiles.push(nuevo);
  savePerfiles(perfiles);
  const idx = perfiles.length - 1;
  perfilOpen[idx] = true;
  perfilEditing[idx] = true;
  renderPerfiles(document.getElementById('content'));
}

function deletePerfil(idx) {
  if (!confirm('¿Seguro que quieres eliminar este perfil?')) return;
  const perfiles = loadPerfiles();
  perfiles.splice(idx, 1);
  savePerfiles(perfiles);
  perfilOpen = {};
  perfilEditing = {};
  renderPerfiles(document.getElementById('content'));
}

function getPerfilCompleteness(p) {
  let total = 0, filled = 0;
  PERFIL_FIELDS.forEach(sec => sec.fields.forEach(f => {
    total++;
    if (p[f.id] && p[f.id].trim()) filled++;
  }));
  return { total, filled, pct: total > 0 ? Math.round(filled/total*100) : 0 };
}

function parseFiscalOrder(str) {
  if (!str) return 9999;
  var s = str.toLowerCase();
  var meses = ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'];
  for (var i = 0; i < meses.length; i++) {
    if (s.indexOf(meses[i]) !== -1) return i;
  }
  return 9999;
}

function renderPerfiles(el) {
  const perfiles = loadPerfiles();
  // Ordenar por primer mes fiscal más próximo
  const indices = perfiles.map((p, i) => i);
  indices.sort((a, b) => parseFiscalOrder(perfiles[a].inicio_fiscal) - parseFiscalOrder(perfiles[b].inicio_fiscal));
  let html = '';

  html += '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:20px">';
  html += '<div><div style="font-size:16px;font-weight:800">Fichas de Clientes</div><div style="font-size:12px;color:var(--muted)">Perfil de cada cliente con servicio contratado, fechas y datos generales</div></div>';
  html += '<button class="perfil-btn perfil-btn-primary" onclick="addPerfil()">+ Nuevo cliente</button>';
  html += '</div>';

  if (perfiles.length === 0) {
    html += '<div class="perfil-empty"><p>No hay perfiles creados todavía.</p><button class="perfil-btn perfil-btn-primary" onclick="addPerfil()">Crear primer perfil</button></div>';
    el.innerHTML = html;
    return;
  }

  indices.forEach(idx => {
    const p = perfiles[idx];
    const isOpen = perfilOpen[idx] || false;
    const isEdit = perfilEditing[idx] || false;
    const comp = getPerfilCompleteness(p);
    const statusColor = comp.pct === 100 ? 'var(--green)' : comp.pct > 50 ? 'var(--amber)' : 'var(--light)';
    const statusLabel = comp.pct === 100 ? 'Completo' : comp.filled + '/' + comp.total;

    html += '<div class="perfil-card">';
    html += '<div class="perfil-header '+(isOpen?'expanded':'')+'" onclick="togglePerfil('+idx+')">';
    html += '<div style="flex:1">';
    html += '<div class="perfil-name">'+(p.nombre_empresa||p._nombre||'Sin nombre')+'</div>';
    html += '</div>';
    html += '<div style="display:flex;align-items:center;gap:10px">';
    if (p.inicio_fiscal) {
      html += '<div class="impl-item" style="padding:6px 12px"><div class="impl-item-label">Primer mes fiscal</div><div class="impl-item-value" style="color:var(--navy)">'+p.inicio_fiscal+'</div></div>';
    }
    html += '<span class="perfil-arrow '+(isOpen?'open':'')+'">▼</span>';
    html += '</div>';
    html += '</div>';

    html += '<div class="perfil-body '+(isOpen?'open':'')+'">';

    PERFIL_FIELDS.forEach(sec => {
      html += '<div class="perfil-section">';
      html += '<div class="perfil-section-title">'+sec.section+'</div>';
      html += '<div class="perfil-grid">';
      sec.fields.forEach(f => {
        const val = p[f.id] || '';
        html += '<div class="perfil-field">';
        html += '<div class="perfil-field-label">'+f.label+'</div>';
        if (isEdit) {
          html += '<input class="perfil-field-input" id="pf-'+idx+'-'+f.id+'" value="'+val.replace(/"/g,'&quot;')+'" placeholder="'+f.placeholder+'">';
        } else {
          html += '<div class="perfil-field-value">'+(val || '<span style="color:var(--light);font-weight:400">—</span>')+'</div>';
        }
        html += '</div>';
      });
      html += '</div></div>';
    });

    html += '<div class="perfil-actions">';
    if (isEdit) {
      html += '<button class="perfil-btn perfil-btn-primary" onclick="event.stopPropagation();savePerfil('+idx+')">Guardar</button>';
      html += '<button class="perfil-btn" onclick="event.stopPropagation();cancelEditPerfil('+idx+')">Cancelar</button>';
      html += '<button class="perfil-btn perfil-btn-danger" style="margin-left:auto" onclick="event.stopPropagation();deletePerfil('+idx+')">Eliminar</button>';
    } else {
      html += '<button class="perfil-btn" onclick="event.stopPropagation();startEditPerfil('+idx+')">Editar</button>';
    }
    html += '</div>';

    html += '</div></div>';
  });

  el.innerHTML = html;
}

// ==================== MAIN APP ====================
// Initialization calls.
// Future: main.js

renderAll();
</script>
</body>
</html>
